server {
    listen 80;

    # 정적 파일 서빙
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # Flask API 리버스 프록시
    location /api/ {
        proxy_pass http://api:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
